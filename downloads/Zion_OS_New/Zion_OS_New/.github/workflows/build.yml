name: Build Zion OS APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: 🎨 Generate launcher icons
        run: flutter pub run flutter_launcher_icons:main

      - name: Create asset directories
        run: |
          mkdir -p assets/translations
          mkdir -p assets/icons/svg_colors
          mkdir -p assets/images
          mkdir -p assets/fonts

      - name: Create English translations
        run: echo '{"app_name":"Zion OS","settings":"Settings"}' > assets/translations/en.json

      - name: Create Arabic translations
        run: echo '{"app_name":"زيون OS","settings":"الإعدادات"}' > assets/translations/ar.json

      - name: Clean previous builds
        run: flutter clean

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zion-os-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
